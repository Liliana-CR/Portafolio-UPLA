<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Liliana Canto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #2d0b3a 0%, #4a154b 50%, #6b1a5e 100%);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #ff66b2;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
    width: 50px;
    height: 60px;
    background: linear-gradient(145deg, #ff66b2, #ff3388);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;  /* Para que la imagen no se salga */
}

        .facultad h3 {
            color: #ff99cc;
            font-size: 0.9rem;
        }

        .facultad h2 {
            color: white;
            font-size: 1.2rem;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .nav-menu a:hover {
            background: #ff66b2;
            color: #2d0b3a;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 2rem;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 2px solid #ff66b2;
            margin-top: 80px;
        }

        .robot-mini {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #ff66b2, #ff3388);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-card h2 {
            color: #ff3388;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            color: #6b1a5e;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ff99cc;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }

        input:focus {
            border-color: #ff3388;
        }

        button {
            background: #ff3388;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #cc0066;
            transform: scale(1.02);
        }

        .error {
            color: #d9534f;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
    <div class="logo">
        <img src="logo.png" alt="Logo UPLA" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
    </div>
    <div class="facultad">
        <h3>FACULTAD DE INGENIERÍA</h3>
        <h2>Sistemas y Computación</h2>
    </div>
</div>
        <div class="nav-menu">
            <a href="index.html">INICIO</a>
            <a href="trabajos.html">TRABAJOS</a>
            <a href="login.html">LOGIN</a>
        </div>
    </div>

    <div class="login-card">
        <div class="robot-mini">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C10 2 8 3 8 5H16C16 3 14 2 12 2Z" fill="white"/>
                <rect x="4" y="5" width="16" height="14" rx="2" fill="white"/>
                <circle cx="9" cy="10" r="1.5" fill="#ff3388"/>
                <circle cx="15" cy="10" r="1.5" fill="#ff3388"/>
                <rect x="11" y="13" width="2" height="4" fill="#ff3388"/>
            </svg>
        </div>
        <h2> Acceso Administradora </h2>
        <p>Ingresa para gestionar tus trabajos</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required autocomplete="off">
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit"> Ingresar </button>
        </form>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Cambia usuario y contraseña aquí
            if (username === "liliana" && password === "1234") {
                localStorage.setItem('adminLogged', 'true');
                window.location.href = "admin.html";
            } else {
                document.getElementById('errorMsg').innerText = " Usuario o contraseña incorrectos";
            }
        });
    </script>
</body>
</html>
