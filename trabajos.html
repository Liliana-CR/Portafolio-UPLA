<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos | Liliana Canto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2d0b3a 0%, #4a154b 50%, #6b1a5e 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #ff66b2;
        }
        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo {
    width: 50px;
    height: 60px;
    background: linear-gradient(145deg, #ff66b2, #ff3388);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;  /* Para que la imagen no se salga */
}
        .facultad h3 { color: #ff99cc; font-size: 0.9rem; }
        .facultad h2 { color: white; font-size: 1.2rem; }
        .nav-menu { display: flex; gap: 2rem; }
        .nav-menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .nav-menu a:hover { background: #ff66b2; color: #2d0b3a; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { color: #ff99cc; text-align: center; margin-bottom: 2rem; }
        .unidad {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 1px solid #ff66b2;
        }
        .unidad-header {
            background: linear-gradient(135deg, #ff3388, #cc0066);
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .unidad-header h2 { color: white; font-size: 1.5rem; }
        .unidad-header span { color: white; font-size: 1.5rem; }
        .semana-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            padding: 1.5rem;
        }
        .semana-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .semana-card:hover { transform: translateY(-5px); border-color: #ff3388; }
        .semana-numero {
            background: #ff3388;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .semana-titulo { font-weight: bold; color: #2d0b3a; margin-bottom: 0.5rem; }
        .semana-estado {
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
        }
        .estado-completado { background: #4caf50; color: white; }
        .estado-subido { background: #2196f3; color: white; }
        .estado-pendiente { background: #ff9800; color: white; }
        .repo-link {
            display: inline-block;
            margin-top: 0.8rem;
            color: #ff3388;
            text-decoration: none;
            font-size: 0.75rem;
        }
        footer { text-align: center; padding: 2rem; color: #ff99cc; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .modal-content h3 { color: #ff3388; margin-bottom: 1rem; }
        .close-modal {
            background: #ff3388;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            margin-top: 1rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .semana-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
    <div class="logo">
        <img src="logo.png" alt="Logo UPLA" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
    </div>
    <div class="facultad">
        <h3>FACULTAD DE INGENIERÍA</h3>
        <h2>Sistemas y Computación</h2>
    </div>
</div>
        <div class="nav-menu">
            <a href="index.html">INICIO</a>
            <a href="trabajos.html">TRABAJOS</a>
            <a href="login.html">LOGIN</a>
        </div>
    </div>

    <div class="container">
        <h1> PLAN DE ESTUDIOS - BASE DE DATOS II</h1>
        <div id="unidades-container"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo"></h3>
            <p id="modal-descripcion"></p>
            <div id="modal-archivos"></div>
            <button class="close-modal" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <footer> © 2026 | Ingeniería de Sistemas | Portafolio Académico | Base de Datos II </footer>

    <script>
        // DATOS INICIALES
        let trabajos = {
            1: { nombre: "Unidad 1 - Optimización y Transacciones", semanas: {} },
            2: { nombre: "Unidad 2 - Programación en Servidor", semanas: {} },
            3: { nombre: "Unidad 3 - Bases de Datos NoSQL", semanas: {} },
            4: { nombre: "Unidad 4 - Administración y Seguridad", semanas: {} }
        };

        // CREAR LAS 16 SEMANAS
        for (let u = 1; u <= 4; u++) {
            for (let s = 1; s <= 4; s++) {
                let numSemana = (u-1)*4 + s;
                trabajos[u].semanas[numSemana] = {
                    titulo: "Semana " + numSemana,
                    descripcion: "Trabajo de la Semana " + numSemana,
                    enlace: "#",
                    estado: "pendiente",
                    archivos: []
                };
            }
        }

        // CARGAR DATOS GUARDADOS
        let datosGuardados = localStorage.getItem('trabajos_estructura');
        if (datosGuardados) {
            trabajos = JSON.parse(datosGuardados);
        } else {
            localStorage.setItem('trabajos_estructura', JSON.stringify(trabajos));
        }

        // FUNCIONES
        function getEstadoClass(estado) {
            if (estado === 'completado') return 'estado-completado';
            if (estado === 'subido') return 'estado-subido';
            return 'estado-pendiente';
        }

        function getEstadoText(estado) {
            if (estado === 'completado') return '✅ Completado';
            if (estado === 'subido') return '📤 Subido';
            return '⏳ Pendiente';
        }

        function toggleUnidad(id) {
            let div = document.getElementById('unidad-' + id);
            let arrow = document.getElementById('arrow-' + id);
            if (div.style.display === 'none') {
                div.style.display = 'grid';
                arrow.textContent = '▼';
            } else {
                div.style.display = 'none';
                arrow.textContent = '▶';
            }
        }

        function verTrabajo(unidad, semanaNum) {
            let semana = trabajos[unidad].semanas[semanaNum];
            document.getElementById('modal-titulo').innerHTML = trabajos[unidad].nombre + '<br>' + semana.titulo;
            document.getElementById('modal-descripcion').innerHTML = semana.descripcion;
            
            let archivosHTML = '';
            if (semana.archivos && semana.archivos.length > 0) {
                archivosHTML = '<hr><h4>📎 Archivos:</h4>';
                for (let i = 0; i < semana.archivos.length; i++) {
                    let a = semana.archivos[i];
                    archivosHTML += '<p><a href="' + (a.url || a.dataURL) + '" target="_blank">📄 ' + a.nombre + '</a> (' + Math.round(a.tamaño/1024) + ' KB)</p>';
                }
            }
            document.getElementById('modal-archivos').innerHTML = archivosHTML;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderizar() {
            let container = document.getElementById('unidades-container');
            let html = '';
            
            for (let u = 1; u <= 4; u++) {
                let unidad = trabajos[u];
                html += '<div class="unidad">';
                html += '<div class="unidad-header" onclick="toggleUnidad(' + u + ')">';
                html += '<h2>' + unidad.nombre + '</h2>';
                html += '<span id="arrow-' + u + '">▼</span>';
                html += '</div>';
                html += '<div id="unidad-' + u + '" class="semana-grid">';
                
                for (let s = 1; s <= 4; s++) {
                    let numSemana = (u-1)*4 + s;
                    let semana = unidad.semanas[numSemana];
                    if (semana) {
                        html += '<div class="semana-card" onclick="verTrabajo(' + u + ', ' + numSemana + ')">';
                        html += '<div class="semana-numero">' + numSemana + '</div>';
                        html += '<div class="semana-titulo">' + semana.titulo + '</div>';
                        html += '<div class="semana-estado ' + getEstadoClass(semana.estado) + '">' + getEstadoText(semana.estado) + '</div>';
                        if (semana.enlace && semana.enlace !== '#') {
                            html += '<a href="' + semana.enlace + '" class="repo-link" target="_blank" onclick="event.stopPropagation()">🔗 REP. GITHUB</a>';
                        } else {
                            html += '<span class="repo-link" style="color:#999;">📁 REP. GITHUB</span>';
                        }
                        html += '</div>';
                    }
                }
                html += '</div></div>';
            }
            container.innerHTML = html;
        }

        renderizar();
    </script>
</body>
</html>
